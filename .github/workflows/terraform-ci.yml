name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  terraform:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infrastructure/dev/aws

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@v4

      - name: Initialize TFLint
        run: tflint --init

      - name: Run TFLint
        run: tflint

      - name: Install tfsec
        run: |
          curl -s https://raw.githubusercontent.com/aquasecurity/tfsec/master/scripts/install_linux.sh | bash

      - name: Run tfsec
        run: tfsec --soft-fail --format json --out tfsec-report

      - name: Install Checkov
        run: |
          python -m pip install --upgrade pip
          pip install checkov

      - name: Run Checkov
        run: checkov -d . --soft-fail -o json > checkov-report.json

      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            infrastructure/dev/aws/tfsec-report.json
            infrastructure/dev/aws/checkov-report.json

      - name: Pipeline Summary
        run: |
          {
           echo "## DevSecOps Pipeline Summary"
           echo ""
           echo "- Terraform format: Passed"
           echo "- Terraform validation: Passed"
           echo "- TFLint: Passed"
           echo "- tfsec: Completed"
           echo "- Checkov: Completed"
          } >> $GITHUB_STEP_SUMMARY
